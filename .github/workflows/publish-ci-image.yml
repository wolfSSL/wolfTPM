name: Publish wolfTPM CI image

# Builds .github/docker/wolftpm-ci/Dockerfile and pushes it to
# ghcr.io/<owner>/wolftpm-ci:<tag>. CI jobs consume this image via
# `container: image: ghcr.io/${{ github.repository_owner }}/wolftpm-ci:v1.0`
# so they no longer run `sudo apt-get install` on every run (the source of
# mirror-timeout flakes).
#
# Mirrors the wolfBoot CI image model: pin a version tag and bump it when
# the Dockerfile changes (do not rely on :latest). The image namespace follows
# the repository owner, so a fork publishes to ghcr.io/<fork-owner>/wolftpm-ci
# and the consumer workflows pull from that same owner automatically.
#
# ONE-TIME MANUAL SETUP after the first successful push: make the
# `wolftpm-ci` package PUBLIC (Profile/Org > Packages > wolftpm-ci > package
# settings > change visibility) so fork PRs can pull it anonymously. Until
# then, only same-owner runs can pull it and forks fall back to apt.
#
# Triggers:
#   - push to master/main when the Dockerfile or this workflow changes
#   - push to the ci_ghcr_image branch (TEMP: lets a fork build the image on
#     push while bringing this up; drop this branch entry before merge)
#   - workflow_dispatch for manual rebuilds

on:
  push:
    branches: [ 'master', 'main', 'ci_ghcr_image' ]
    paths:
      - '.github/docker/wolftpm-ci/**'
      - '.github/workflows/publish-ci-image.yml'
  workflow_dispatch: {}

concurrency:
  # Single global group: every run publishes to the shared version tag, so
  # serialize to avoid two runs racing to overwrite it.
  group: publish-ci-image
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Runs for any owner: the job only ever pushes to its own ghcr namespace
    # (GITHUB_TOKEN has packages:write to the owner running it), so forks can
    # publish their own wolftpm-ci image for testing.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Compute lowercase owner
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .github/docker/wolftpm-ci
          file: .github/docker/wolftpm-ci/Dockerfile
          push: true
          # ghcr image paths must be lowercase (the wolfSSL org has a capital S).
          tags: ghcr.io/${{ steps.owner.outputs.lc }}/wolftpm-ci:v1.0
          cache-from: type=registry,ref=ghcr.io/${{ steps.owner.outputs.lc }}/wolftpm-ci:v1.0
          cache-to: type=inline
