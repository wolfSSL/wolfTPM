name: Coverity Scan master branch

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1-5'

jobs:
  coverity:
    if: github.repository_owner == 'wolfssl'
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    steps:
    - uses: actions/checkout@v4
      with:
        ref: master

    # Cache the built wolfSSL tree keyed on the resolved upstream commit so it
    # is rebuilt only when wolfSSL master moves, not on every run.
    - name: Resolve wolfSSL commit
      id: wolfssl_rev
      run: echo "sha=$(git ls-remote https://github.com/wolfSSL/wolfssl.git master | awk 'NR==1{print $1}')" >> "$GITHUB_OUTPUT"

    - name: Cache wolfSSL build
      id: wolfssl_cache
      uses: actions/cache@v4
      with:
        path: wolfssl
        key: wolfssl-coverity-fixes-${{ runner.os }}-${{ steps.wolfssl_rev.outputs.sha }}-v1

    - uses: actions/checkout@master
      if: steps.wolfssl_cache.outputs.cache-hit != 'true'
      with:
        repository: wolfssl/wolfssl
        ref: ${{ steps.wolfssl_rev.outputs.sha }}
        path: wolfssl
    - name: wolfssl autogen
      if: steps.wolfssl_cache.outputs.cache-hit != 'true'
      working-directory: ./wolfssl
      run: ./autogen.sh
    - name: wolfssl configure
      if: steps.wolfssl_cache.outputs.cache-hit != 'true'
      working-directory: ./wolfssl
      run: ./configure --enable-wolftpm --enable-pkcallbacks --enable-keygen CFLAGS="-DWC_RSA_NO_PADDING"
    - name: wolfssl make
      if: steps.wolfssl_cache.outputs.cache-hit != 'true'
      working-directory: ./wolfssl
      run: make
    - name: wolfssl make install
      working-directory: ./wolfssl
      run: sudo make install

    - name: Configure wolfTPM M-F
      run: |
        ./autogen.sh
        ./configure

    - name: Check secrets
      env:
        token_var: ${{ secrets.COVERITY_SCAN_TOKEN_WOLFTPM }}
        email_var: ${{ secrets.COVERITY_SCAN_EMAIL }}
      run: |
        token_len=${#token_var}
        echo "$token_len"
        email_len=${#email_var}
        echo "$email_len"

    - name: Cache key (month-based, tool updates ~twice yearly)
      id: cov-cache-key
      run: echo "key=$(date +%Y-%m)" >> $GITHUB_OUTPUT

    - name: Cache Coverity Build Tool
      id: cov-build-cache
      uses: actions/cache@v4
      with:
        path: cov-analysis
        key: cov-build-cxx-linux64-${{ steps.cov-cache-key.outputs.key }}

    - name: Download Coverity Build Tool
      if: steps.cov-build-cache.outputs.cache-hit != 'true'
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN_WOLFTPM }}
      run: |
        curl -L --fail --no-progress-meter \
          --output cov-analysis.tar.gz \
          --data-urlencode "token=${TOKEN}" \
          --data-urlencode "project=wolfTPM" \
          https://scan.coverity.com/download/cxx/linux64
        file cov-analysis.tar.gz
        if ! gzip -t cov-analysis.tar.gz 2>/dev/null; then
          echo "Downloaded file is not gzip — server response:"
          head -c 2000 cov-analysis.tar.gz
          exit 1
        fi
        mkdir -p cov-analysis
        tar -xzf cov-analysis.tar.gz --strip 1 -C cov-analysis

    - name: Build with cov-build
      run: |
        export PATH="${PWD}/cov-analysis/bin:${PATH}"
        cov-build --dir cov-int make

    - name: Archive results
      run: tar -czvf cov-int.tgz cov-int

    - name: Submit results to Coverity Scan
      env:
        TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN_WOLFTPM }}
        EMAIL: ${{ secrets.COVERITY_SCAN_EMAIL }}
      run: |
        curl \
          --form token="${TOKEN}" \
          --form email="${EMAIL}" \
          --form file=@cov-int.tgz \
          --form version="${GITHUB_SHA}" \
          --form description="coverity-scan wolfSSL/wolfTPM / ${GITHUB_REF}" \
          "https://scan.coverity.com/builds?project=wolfTPM"
